<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
  <style>
    body {
      background-color: #1a202c;
      padding: 1rem;
      font-family: 'Montserrat';
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      min-height: 100vh;
      background-color: #1a202c;
      padding-top: 2.5rem;
    }

    h1 {
      font-size: 1.125rem;
      color: #cbd5e0;
      font-weight: 500;
    }

    table {
      width: 100%;
      color: #a0aec0;
      border-collapse: collapse;
      border-radius: 0.5rem;
      overflow: hidden;
      margin-top: 1.5rem;
    }

    th, td {
      padding: 1rem;
      text-align: center;
    }

    th {
      background-color: #2d3748;
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 500;
    }

    tr:nth-child(even) {
      background-color: rgba(0, 0, 0, 0.2);
    }

    tr:nth-child(odd) {
      background-color: transparent;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Component Start -->
  <h1>Tabla de Descansos</h1>
  <div>
    <table>
      <thead>
      <tr>
        <th>Integrante</th>
        <th>Descansos</th>
      </tr>
      </thead>
      <tbody id="sheetData"></tbody>
    </table>
  </div>
  <!-- Component End  -->

</div>

<script>
  // URL pública del archivo CSV
  var csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNhXeP5lhRcIXh2k272Bq4zTyIy18KYsLcynA01yC8XMTjnCST7X4c2c-8F03-vzmbF8dqJ9XiVAfa/pub?gid=0&single=true&output=csv";

  // Función para cargar los datos del archivo CSV y agregar las filas ordenadas
  function loadCSVData() {
    fetch(csvURL)
      .then(response => response.text())
      .then(data => {
        var lines = data.split('\n');

        // Crear un array de objetos para facilitar el ordenamiento
        var dataObjects = lines.map(line => {
          var cells = line.split(',');
          return { integrante: cells[0], descansos: parseInt(cells[1], 10) };
        });

        // Ordenar el array por la columna "Descansos"
        dataObjects.sort((a, b) => b.descansos - a.descansos);

        var sheetDataContainer = document.getElementById("sheetData");

        dataObjects.forEach((row, index) => {
          var integrante = row.integrante;
          var descansos = row.descansos;

          var newRow = document.createElement("tr");

          // Aplicar clase de fondo intercalado
          newRow.className = index % 2 === 0 ? "even-row" : "odd-row";

          newRow.innerHTML = `
            <td>${integrante}</td>
            <td>${descansos}</td>
          `;

          sheetDataContainer.appendChild(newRow);
        });
      })
      .catch(error => console.error("Error al cargar los datos:", error));
  }

  window.onload = loadCSVData;
</script>

</body>
</html>
