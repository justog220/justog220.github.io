<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/dist/output.css" rel="stylesheet">
</head>

<body class="bg-gray-900 p-4">

    <div class="flex flex-col items-center justify-center w-screen min-h-screen bg-gray-900 py-10">

        <!-- Component Start -->
        <h1 class="text-lg text-gray-400 font-medium">Tabla de Descansos</h1>
        <div class="flex flex-col mt-6">
            <div class="-my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
                <div class="py-2 align-middle inline-block min-w-full sm:px-6 lg:px-8">
                    <div class="shadow overflow-hidden sm:rounded-lg">
                        <table class="min-w-full text-sm text-gray-400">
                            <thead class="bg-gray-800 text-xs uppercase font-medium">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left tracking-wider">
                                        Integrante
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left tracking-wider">
                                        Descansos
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="sheetData" class="bg-gray-800">
                                
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    
        <!-- Component End  -->
    
    </div>
    <script>
        // URL pública del archivo CSV
        var csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNhXeP5lhRcIXh2k272Bq4zTyIy18KYsLcynA01yC8XMTjnCST7X4c2c-8F03-vzmbF8dqJ9XiVAfa/pub?gid=0&single=true&output=csv";

        // Función para cargar los datos del archivo CSV y agregar las filas ordenadas
        function loadCSVData() {
            fetch(csvURL)
                .then(response => response.text())
                .then(data => {
                    var lines = data.split('\n');

                    // Crear un array de objetos para facilitar el ordenamiento
                    var dataObjects = lines.map(line => {
                        var cells = line.split(',');
                        return { integrante: cells[0], descansos: parseInt(cells[1], 10) };
                    });

                    // Ordenar el array por la columna "Descansos"
                    dataObjects.sort((a, b) => b.descansos - a.descansos);

                    var sheetDataContainer = document.getElementById("sheetData");

                    dataObjects.forEach((row, index) => {
                        var integrante = row.integrante;
                        var descansos = row.descansos;

                        var newRow = document.createElement("tr");

                        // Aplicar clase de fondo intercalado
                        newRow.className = index % 2 === 0 ? "bg-black bg-opacity-20" : "";

                        newRow.innerHTML = `
                            <td class="px-6 py-3 text-center items-center">${integrante}</td>
                            <td class="px-6 py-3 text-center items-center">${descansos}</td>
                        `;

                        sheetDataContainer.appendChild(newRow);
                    });
                })
                .catch(error => console.error("Error al cargar los datos:", error));
        }

        window.onload = loadCSVData;
    </script>
  </body>

</html>
